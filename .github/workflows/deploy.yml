name: Deploy Widget

on:
  push:
    branches:
      - dev
      - qa
      - prod
  pull_request:
    branches:
      - dev
      - qa
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build App
        run: |
          npm ci
          npm run build
        env:
          # Injecting Backend connection details into the build
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Sanitize Environment Name
        id: sanitize_env
        run: |
          # Get branch name (head_ref for PRs, ref_name for dispatch)
          RAW_BRANCH=${{ github.head_ref || github.ref_name }}
          # Replace slashes with hyphens
          SANITIZED_BRANCH=${RAW_BRANCH//\//-}
          echo "ENV_NAME=${SANITIZED_BRANCH}" >> $GITHUB_ENV

      - name: Deploy with CDK
        working-directory: infra
        run: |
          # Map branch to environment variables
          export ENV="${{ github.ref_name }}"
          
          if [ "$ENV" == "main" ] || [ "$ENV" == "prod" ]; then
            export ENV="prod"
            # Activando dominio propio para producción
            export DOMAIN_NAME="widget.holalucia.cl"
            export CERTIFICATE_ARN="$CERTIFICATE_ARN_SECRET"
          else
            export DOMAIN_NAME="${ENV}.widget.holalucia.cl"
            export CERTIFICATE_ARN="$CERTIFICATE_ARN_SECRET"
          fi

          echo "Deploying to environment: $ENV with domain: $DOMAIN_NAME"

          npx cdk deploy --all --require-approval never
        env:
          ENV: ${{ env.ENV_NAME }}
          CERTIFICATE_ARN_SECRET: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN }}
