name: Deploy Widget

on:
  push:
    branches:
      - dev
      - qa
      - stg
      - prod
  pull_request:
    branches:
      - dev
      - qa
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build App
        run: |
          npm ci
          npm run build
        env:
          # Injecting Backend connection details into the build
          # In a real setup, these should use secrets or environment variables
          API_URL: https://gn6cbrywdnecbgdg6mg4lhi6xm.appsync-api.us-east-1.amazonaws.com/graphql
          API_KEY: da2-xkpl4cb2cvfnxlaogyo5y6gqr4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Sanitize Environment Name
        id: sanitize_env
        run: |
          # Get branch name (head_ref for PRs, ref_name for dispatch)
          RAW_BRANCH=${{ github.head_ref || github.ref_name }}
          # Replace slashes with hyphens
          SANITIZED_BRANCH=${RAW_BRANCH//\//-}
          echo "ENV_NAME=${SANITIZED_BRANCH}" >> $GITHUB_ENV

      - name: Deploy with CDK
        working-directory: infra
        run: |
          # Map branch to environment variables
          if [ "${{ github.ref_name }}" == "main" ] || [ "${{ github.ref_name }}" == "prod" ] || [ "${{ github.ref_name }}" == "dev" ]; then
            export ENV="prod"
            # Omitiendo dominio propio temporalmente por migración
            # export DOMAIN_NAME="widget.holalucia.cl"
            # export CERTIFICATE_ARN="$CERT_PROD"
          else
            export ENV="${{ github.ref_name }}"
            export DOMAIN_NAME="${ENV}.widget.holalucia.cl"

            ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
            var_name="CERT_${ENV_UPPER}"
            export CERTIFICATE_ARN="${!var_name}"
          fi

          echo "Deploying to environment: $ENV with domain: $DOMAIN_NAME"

          npx cdk deploy --all --require-approval never
        env:
          ENV: ${{ env.ENV_NAME }}
          CERT_DEV: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_DEV }}
          CERT_QA: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_QA }}
          CERT_STG: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_STG }}
          CERT_PROD: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_PROD }}
